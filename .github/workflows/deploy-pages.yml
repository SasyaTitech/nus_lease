name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Assemble static bundle
        run: |
          mkdir -p _site/web
          mkdir -p _site/data/processed
          mkdir -p _site/data/fixtures
          mkdir -p _site/data/raw

          cp -R web/. _site/web/
          cp data/processed/market_snapshot.json _site/data/processed/
          cp data/fixtures/demo_market_snapshot.json _site/data/fixtures/
          cp data/raw/planning_area_boundaries.geojson _site/data/raw/
          cp data/raw/district_centroids.json _site/data/raw/

          cat > _site/index.html <<'EOF'
          <!doctype html>
          <html lang="zh-CN">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <meta http-equiv="refresh" content="0; url=./web/" />
              <title>Lion City Rent Atlas</title>
            </head>
            <body>
              <p>Redirecting to <a href="./web/">dashboard</a>...</p>
            </body>
          </html>
          EOF

          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
